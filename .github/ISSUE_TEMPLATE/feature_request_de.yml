name: Funktionsanfrage
description: Schlage eine Idee für Homematic(IP) Local for OpenCCU vor
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Vielen Dank, dass Du Dir die Zeit nimmst, eine Verbesserung vorzuschlagen!

        **Frontend-Probleme** (Benutzeroberfläche, Dashboard-Karten, visuelle Fehler) sollten im
        [homematicip_local_frontend](https://github.com/sukramj/homematicip_local_frontend/issues) Repository gemeldet werden.

        Für allgemeine Fragen und Diskussionen nutze bitte das
        [Diskussionsforum](https://github.com/sukramj/aiohomematic/discussions).
  - type: checkboxes
    attributes:
      label: Checkliste
      options:
        - label: Ich habe die [bestehenden Issues](https://github.com/sukramj/aiohomematic/issues) geprüft und diese Funktion wurde noch nicht angefragt
          required: true
        - label: Ich habe die [Diskussionen](https://github.com/sukramj/aiohomematic/discussions) geprüft und dies wurde noch nicht besprochen
          required: true
        - label: Dies ist KEIN Frontend-/UI-Problem (diese gehören in das [Frontend-Repo](https://github.com/sukramj/homematicip_local_frontend/issues))
          required: true
  - type: dropdown
    validations:
      required: true
    attributes:
      label: Kategorie
      description: >
        Auf welchen Bereich bezieht sich Deine Funktionsanfrage?
      options:
        - Geräteunterstützung (neu oder verbessert)
        - Integration mit Home Assistant
        - Backend-Kommunikation (CCU/Homegear)
        - Konfiguration / Einrichtung
        - Leistung / Stabilität
        - Dokumentation
        - Sonstiges
  - type: textarea
    validations:
      required: true
    attributes:
      label: Beschreibung
      description: >-
        Bitte beschreibe die Funktion oder Verbesserung, die Du Dir wünschst.

        1. **Was möchtest Du?** (Beschreibe die gewünschte Funktionalität)

        2. **Warum brauchst Du es?** (Welches Problem wird gelöst oder welchen Anwendungsfall unterstützt es?)

        3. **Wie löst Du es aktuell?** (Falls zutreffend)
  - type: textarea
    attributes:
      label: Lösungsvorschlag
      description: >-
        Wenn Du eine Idee hast, wie dies umgesetzt werden könnte, beschreibe sie bitte hier.
        Dies ist optional, kann uns aber helfen, Deine Vorstellung zu verstehen.
  - type: textarea
    attributes:
      label: Zusätzlicher Kontext
      description: >
        Füge weiteren Kontext, Screenshots oder Referenzen hinzu, die hilfreich sein könnten.
